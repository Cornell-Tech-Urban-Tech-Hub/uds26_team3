    fromDatasetId: 'dataset_raw',
    transform: {
      type: 'filter',
      config: { dimension: 'Series', '=': name }
    }
  });
  seriesList.push({
    type: 'line',
    datasetId: datasetId,
    showSymbol: false,
    name: name,
    smooth: true,
    lineStyle: {
      width: name.startsWith('S2') ? 2.5 : 3,
      type: name.startsWith('S2') ? 'dashed' : 'solid'
    },
    color: colorMap[name] || '#888',
    endLabel: {
      show: true,
      formatter: function (params) {
        return params.value[1].replace(' (g/day)','') + ': ' + params.value[2];
      },
      fontSize: 11
    },
    labelLayout: { moveOverlap: 'shiftY' },
    emphasis: { focus: 'series' },
    encode: {
      x: 'Year',
      y: 'Value',
      label: ['Series', 'Value'],
      itemName: 'Year',
      tooltip: ['Value']
    }
  });
});

option = {
  animationDuration: 8000,
  dataset: [
    { id: 'dataset_raw', source: rawData },
    ...datasetWithFilters
  ],
  title: {
    text: 'Gowanus BID — Daily Air Quality Benefits Over 50 Years',
    textStyle: {
      color: '#e8e0d0',
      fontSize: 18,
      fontWeight: 'normal'
    },
    subtext: 'S0 = Base (842 trees)  |  S2 = New trees + sidewalk mod (1,018 trees)\nSolid = S0  |  Dashed = S2',
    subtextStyle: {
      color: '#9dc4a8',
      fontSize: 12
    },
    left: 'center'
  },
  tooltip: {
    order: 'valueDesc',
    trigger: 'axis'
  },
  xAxis: {
    type: 'category',
    name: 'Years from now',
    nameLocation: 'middle',
    nameGap: 30
  },
  yAxis: {
    name: 'Daily removal (g/day)'
  },
  grid: { right: 180 },
  series: seriesList
};

myChart.setOption(option);

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
  </script>
</body>
